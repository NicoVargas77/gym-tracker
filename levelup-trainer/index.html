<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LevelUp Trainer">
<meta name="theme-color" content="#050510">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/styles.css">
<title>LevelUp Trainer</title>
</head>
<body>

<div class="levelup-flash" id="levelupFlash"></div>
<div class="toast" id="toast"></div>

<div class="header">
  <div class="header-top">
    <div class="app-name">LEVELUP</div>
    <div class="header-xp">
      <div class="level-badge" id="headerLevel">LVL 1</div>
      <div class="xp-bar-wrap">
        <div class="xp-bar-fill" id="headerXpBar" style="width:0%"></div>
      </div>
      <div class="xp-label" id="headerXpLabel">0/100</div>
    </div>
    <div class="streak-pill" id="streakPill">🔥 0</div>
  </div>
  <div class="tabs-nav">
    <button class="tab-btn on" onclick="showTab('workout',this)">Quest</button>
    <button class="tab-btn" onclick="showTab('metrics',this)">Stats</button>
    <button class="tab-btn" onclick="showTab('history',this)">Log</button>
  </div>
</div>

<div class="content">

  <!-- ─── QUEST (ENTRENAMIENTO) ─── -->
  <div id="workout" class="section on">
    <div class="char-panel" id="charPanel">
      <div class="char-svg-wrap" id="charSvgWrap">
        <div class="char-aura" id="charAura"></div>
        <svg id="charSvg" width="80" height="100" viewBox="0 0 80 100" fill="none" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
      <div class="char-info">
        <div class="char-name" id="charName">HUNTER</div>
        <div class="char-title" id="charTitle">Rango E · Principiante</div>
        <div class="char-stats">
          <div class="char-stat">
            <div class="char-stat-label">Total XP</div>
            <div class="char-stat-val" id="charXp">0</div>
          </div>
          <div class="char-stat">
            <div class="char-stat-label">Sesiones</div>
            <div class="char-stat-val" id="charSessions">0</div>
          </div>
          <div class="char-stat">
            <div class="char-stat-label">Racha</div>
            <div class="char-stat-val" id="charStreak">0🔥</div>
          </div>
        </div>
      </div>
    </div>
    <div class="day-scroll" id="dayPills"></div>
    <div class="workout-card" id="dayContent"></div>
  </div>

  <!-- ─── STATS (MÉTRICAS) ─── -->
  <div id="metrics" class="section">
    <div id="latestSummary"></div>
    <div class="form-card">
      <div class="form-title">↑ REGISTRAR MEDICIÓN</div>
      <div class="form-grid">
        <div class="field full"><label>Fecha</label><input type="date" id="mDate"></div>
        <div class="field"><label>Peso (kg)</label><input type="number" id="mPeso" step="0.1" placeholder="82.0"></div>
        <div class="field"><label>% Grasa</label><input type="number" id="mGrasa" step="0.1" placeholder="26.7"></div>
        <div class="field"><label>% Músculo</label><input type="number" id="mMusculo" step="0.1" placeholder="69.4"></div>
        <div class="field"><label>Grasa visceral</label><input type="number" id="mVisceral" step="0.1" placeholder="10"></div>
        <div class="field"><label>TMB (kcal)</label><input type="number" id="mTmb" step="1" placeholder="1527"></div>
        <div class="field"><label>% Agua</label><input type="number" id="mAgua" step="0.1" placeholder="52.1"></div>
        <div class="field"><label>% M. Esquelético</label><input type="number" id="mEsq" step="0.1" placeholder="41.0"></div>
        <div class="field"><label>% Proteína</label><input type="number" id="mProt" step="0.1" placeholder="17.3"></div>
        <div class="field"><label>Masa ósea (kg)</label><input type="number" id="mOsea" step="0.1" placeholder="3.2"></div>
      </div>
      <button class="save-btn" onclick="saveMetric()">GUARDAR MEDICIÓN</button>
    </div>
  </div>

  <!-- ─── LOG (HISTORIAL) ─── -->
  <div id="history" class="section">
    <div class="chart-card">
      <div class="chart-title">Evolución corporal</div>
      <div class="chart-sub">PESO (KG) · GRASA (%)</div>
      <div class="chart-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#00b4ff"></div>Peso kg</div>
        <div class="legend-item"><div class="legend-dot" style="background:#00ff88"></div>Grasa %</div>
      </div>
      <div class="chart-wrap"><canvas id="progressChart"></canvas></div>
    </div>
    <div class="section-label">Registros guardados</div>
    <div id="historyList"></div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>
