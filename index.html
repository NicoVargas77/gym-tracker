<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LevelUp Trainer">
<meta name="theme-color" content="#050510">
<title>LevelUp Trainer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&family=Inter:wght@400;500&display=swap');

  :root {
    --bg: #050510;
    --bg2: #080818;
    --bg3: #0a0a1a;
    --surface: #0d0d22;
    --surface2: #111128;
    --blue: #00b4ff;
    --blue2: #4dd6ff;
    --blue-dim: rgba(0,180,255,0.1);
    --blue-glow: rgba(0,180,255,0.25);
    --cyan: #00fff0;
    --cyan-dim: rgba(0,255,240,0.08);
    --gold: #ffc533;
    --gold-dim: rgba(255,197,51,0.12);
    --red: #ff3c6e;
    --red-dim: rgba(255,60,110,0.12);
    --green: #00ff88;
    --green-dim: rgba(0,255,136,0.1);
    --text: #e8f0ff;
    --text2: #6a7a9a;
    --text3: #3a4a6a;
    --border: rgba(0,180,255,0.1);
    --border2: rgba(0,180,255,0.2);
    --radius: 12px;
    --radius-sm: 8px;
    --font: 'Rajdhani', sans-serif;
    --title: 'Orbitron', monospace;
    --body: 'Inter', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    max-width: 430px;
    margin: 0 auto;
    overflow-x: hidden;
    position: relative;
  }

  /* Ambient grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,180,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,180,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Scanline effect */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 0;
  }

  /* ─── HEADER ─── */
  .header {
    padding: 48px 16px 12px;
    background: linear-gradient(180deg, rgba(0,10,30,0.98) 0%, transparent 100%);
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(20px);
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .app-name {
    font-family: var(--title);
    font-size: 15px;
    font-weight: 700;
    color: var(--blue);
    letter-spacing: 2px;
    text-shadow: 0 0 20px var(--blue-glow);
  }

  /* XP Bar in header */
  .header-xp {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    margin: 0 12px;
  }

  .level-badge {
    font-family: var(--title);
    font-size: 10px;
    font-weight: 700;
    color: var(--gold);
    background: var(--gold-dim);
    border: 1px solid rgba(255,197,51,0.3);
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 1px;
    white-space: nowrap;
    text-shadow: 0 0 10px rgba(255,197,51,0.5);
  }

  .xp-bar-wrap {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.05);
    border-radius: 3px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .xp-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blue), var(--cyan));
    border-radius: 3px;
    transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 0 8px var(--blue-glow);
  }

  .xp-label {
    font-family: var(--title);
    font-size: 9px;
    color: var(--text2);
    white-space: nowrap;
  }

  /* Streak */
  .streak-pill {
    display: flex;
    align-items: center;
    gap: 4px;
    font-family: var(--title);
    font-size: 10px;
    color: var(--gold);
    background: var(--gold-dim);
    border: 1px solid rgba(255,197,51,0.2);
    padding: 3px 8px;
    border-radius: 4px;
  }

  /* Tabs */
  .tabs-nav {
    display: flex;
    gap: 2px;
    background: rgba(0,0,0,0.5);
    border-radius: 8px;
    padding: 3px;
    border: 1px solid var(--border);
  }

  .tab-btn {
    flex: 1;
    padding: 7px 4px;
    font-size: 11px;
    font-weight: 600;
    font-family: var(--font);
    text-align: center;
    color: var(--text2);
    background: transparent;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: all .2s;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .tab-btn.on {
    background: var(--blue);
    color: #000;
    box-shadow: 0 0 15px var(--blue-glow);
  }

  /* ─── CONTENT ─── */
  .content { padding: 12px 12px 100px; position: relative; z-index: 1; }
  .section { display: none; }
  .section.on { display: block; }

  /* ─── CHARACTER PANEL ─── */
  .char-panel {
    background: linear-gradient(135deg, #080818 0%, #0a0a25 100%);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
    display: flex;
    gap: 16px;
    align-items: center;
    position: relative;
    overflow: hidden;
  }

  .char-panel::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -20%;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, var(--blue-dim) 0%, transparent 70%);
    pointer-events: none;
  }

  .char-svg-wrap {
    position: relative;
    flex-shrink: 0;
  }

  .char-aura {
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--blue-dim) 0%, transparent 70%);
    animation: aura-pulse 3s ease-in-out infinite;
  }

  @keyframes aura-pulse {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.1); }
  }

  .char-info { flex: 1; }

  .char-name {
    font-family: var(--title);
    font-size: 13px;
    font-weight: 700;
    color: var(--blue2);
    letter-spacing: 1px;
    margin-bottom: 2px;
  }

  .char-title {
    font-size: 11px;
    color: var(--text2);
    font-family: var(--body);
    margin-bottom: 8px;
    letter-spacing: 0.5px;
  }

  .char-stats {
    display: flex;
    gap: 12px;
  }

  .char-stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .char-stat-label {
    font-size: 9px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-family: var(--title);
  }

  .char-stat-val {
    font-size: 14px;
    font-weight: 700;
    color: var(--cyan);
    font-family: var(--title);
    text-shadow: 0 0 8px rgba(0,255,240,0.4);
  }

  /* Level up flash */
  .levelup-flash {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at center, rgba(0,180,255,0.4) 0%, transparent 70%);
    pointer-events: none;
    z-index: 999;
    opacity: 0;
    transition: opacity 0.1s;
  }
  .levelup-flash.show { opacity: 1; animation: flash-out 1.5s forwards; }
  @keyframes flash-out {
    0% { opacity: 1; }
    40% { opacity: 0.8; }
    100% { opacity: 0; }
  }

  /* ─── DAY PILLS ─── */
  .day-scroll {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: none;
    margin-bottom: 12px;
  }
  .day-scroll::-webkit-scrollbar { display: none; }

  .day-pill {
    flex-shrink: 0;
    padding: 7px 14px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    color: var(--text2);
    background: var(--surface);
    transition: all .2s;
    white-space: nowrap;
    font-family: var(--font);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    position: relative;
  }

  .day-pill.on {
    background: var(--blue-dim);
    color: var(--blue2);
    border-color: var(--blue);
    box-shadow: 0 0 12px var(--blue-dim);
  }

  .day-pill.done {
    border-color: rgba(0,255,136,0.3);
    color: var(--green);
  }

  .day-pill.done::after {
    content: '✓';
    position: absolute;
    top: -4px;
    right: -4px;
    width: 14px;
    height: 14px;
    background: var(--green);
    color: #000;
    border-radius: 50%;
    font-size: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
  }

  /* ─── WORKOUT CARD ─── */
  .workout-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    position: relative;
  }

  .wk-head {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(90deg, var(--blue-dim), transparent);
  }

  .wk-name {
    font-size: 16px;
    font-weight: 700;
    font-family: var(--font);
    letter-spacing: 0.5px;
    color: var(--blue2);
  }

  .wk-badge {
    font-size: 10px;
    padding: 3px 10px;
    border-radius: 4px;
    background: var(--blue-dim);
    color: var(--blue);
    font-family: var(--title);
    letter-spacing: 1px;
    border: 1px solid var(--border2);
  }

  .wk-meta {
    padding: 8px 16px;
    font-size: 11px;
    color: var(--text2);
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.3);
    font-family: var(--body);
    letter-spacing: 0.3px;
  }

  .wk-warmup {
    padding: 10px 16px;
    font-size: 12px;
    color: var(--text2);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
    font-family: var(--body);
    align-items: center;
  }

  .wk-warmup b {
    color: var(--gold);
    font-weight: 600;
    flex-shrink: 0;
    font-family: var(--font);
    letter-spacing: 0.5px;
  }

  /* XP per session badge */
  .session-xp {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--blue-dim);
  }

  .session-xp-label { font-size: 11px; color: var(--text2); font-family: var(--body); }
  .session-xp-val {
    font-family: var(--title);
    font-size: 13px;
    color: var(--gold);
    font-weight: 700;
    text-shadow: 0 0 10px rgba(255,197,51,0.4);
  }

  /* ─── EXERCISE ROWS ─── */
  .ex-row {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: grid;
    grid-template-columns: 28px 1fr auto;
    gap: 0 10px;
    align-items: center;
    transition: background 0.2s;
  }

  .ex-row:last-child { border-bottom: none; }
  .ex-row.completed { background: rgba(0,255,136,0.04); }

  /* Checkbox */
  .ex-check {
    width: 22px;
    height: 22px;
    border-radius: 4px;
    border: 1.5px solid var(--border2);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    position: relative;
  }

  .ex-check.checked {
    background: var(--green);
    border-color: var(--green);
    box-shadow: 0 0 10px rgba(0,255,136,0.3);
  }

  .ex-check.checked::after {
    content: '✓';
    color: #000;
    font-size: 13px;
    font-weight: 700;
  }

  .ex-info { min-width: 0; }
  .ex-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
    font-family: var(--font);
    letter-spacing: 0.3px;
    transition: color 0.2s;
  }
  .ex-row.completed .ex-name { color: var(--text2); text-decoration: line-through; text-decoration-color: var(--text3); }
  .ex-equip { font-size: 11px; color: var(--text3); margin-top: 2px; font-family: var(--body); }

  .ex-right { text-align: right; }
  .ex-series {
    font-size: 13px;
    font-weight: 700;
    color: var(--blue2);
    font-family: var(--title);
    white-space: nowrap;
    text-shadow: 0 0 8px var(--blue-dim);
  }
  .ex-rest { font-size: 10px; color: var(--text3); margin-top: 2px; font-family: var(--body); }

  /* Complete session button */
  .complete-btn {
    margin: 12px;
    padding: 14px;
    border-radius: var(--radius-sm);
    background: linear-gradient(135deg, var(--blue), #0066cc);
    color: #000;
    font-size: 14px;
    font-weight: 700;
    font-family: var(--title);
    border: none;
    cursor: pointer;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    transition: all 0.2s;
    box-shadow: 0 0 20px var(--blue-glow);
    width: calc(100% - 24px);
  }

  .complete-btn:active { opacity: .85; transform: scale(.98); }
  .complete-btn:disabled {
    background: var(--surface2);
    color: var(--text3);
    box-shadow: none;
    cursor: not-allowed;
  }

  .tip-box {
    margin: 12px;
    padding: 10px 12px;
    background: var(--cyan-dim);
    border-radius: var(--radius-sm);
    border-left: 2px solid var(--cyan);
    font-size: 12px;
    color: var(--text2);
    line-height: 1.5;
    font-family: var(--body);
  }

  .tip-box b { color: var(--cyan); font-weight: 600; }

  /* Progress bar in workout */
  .session-progress {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
  }

  .sp-top {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
  }

  .sp-label { font-size: 10px; color: var(--text2); font-family: var(--body); }
  .sp-count { font-size: 10px; color: var(--blue); font-family: var(--title); font-weight: 700; }

  .sp-bar {
    height: 4px;
    background: rgba(255,255,255,0.05);
    border-radius: 2px;
    overflow: hidden;
  }

  .sp-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blue), var(--cyan));
    border-radius: 2px;
    transition: width 0.4s ease;
    box-shadow: 0 0 6px var(--blue-glow);
  }

  /* ─── METRICS ─── */
  .alert-box {
    padding: 10px 12px;
    background: rgba(255,197,51,0.08);
    border-radius: var(--radius-sm);
    border-left: 2px solid var(--gold);
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 12px;
    line-height: 1.5;
    font-family: var(--body);
  }
  .alert-box b { color: var(--gold); font-weight: 600; }

  .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }

  .sum-card {
    background: var(--surface);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  .sum-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, var(--blue), transparent);
  }

  .sum-label {
    font-size: 9px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: .12em;
    font-family: var(--title);
    margin-bottom: 4px;
  }

  .sum-val {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    font-family: var(--title);
  }

  .sum-unit { font-size: 11px; color: var(--text2); }

  .form-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 16px;
    margin-bottom: 12px;
  }

  .form-title {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 14px;
    font-family: var(--font);
    color: var(--blue2);
    letter-spacing: 0.5px;
  }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .field { display: flex; flex-direction: column; gap: 5px; }
  .field.full { grid-column: 1/-1; }
  .field label { font-size: 10px; color: var(--text2); font-family: var(--title); letter-spacing: 1px; }

  .field input {
    padding: 9px 12px;
    font-size: 14px;
    font-family: var(--title);
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text);
    outline: none;
    transition: border-color .15s, box-shadow .15s;
    -webkit-appearance: none;
  }

  .field input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 10px var(--blue-dim);
  }

  .field input::placeholder { color: var(--text3); }

  .save-btn {
    width: 100%;
    padding: 13px;
    border-radius: var(--radius-sm);
    background: linear-gradient(135deg, var(--blue), #0066cc);
    color: #000;
    font-size: 13px;
    font-weight: 700;
    font-family: var(--title);
    border: none;
    cursor: pointer;
    margin-top: 10px;
    transition: opacity .15s, transform .1s;
    letter-spacing: 2px;
    text-transform: uppercase;
    box-shadow: 0 0 20px var(--blue-glow);
  }

  .save-btn:active { opacity: .85; transform: scale(.98); }

  /* ─── HISTORY ─── */
  .hist-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    margin-bottom: 8px;
  }

  .hist-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(90deg, var(--blue-dim), transparent);
  }

  .hist-date { font-size: 11px; color: var(--text2); font-family: var(--title); letter-spacing: 1px; }
  .hist-weight { font-size: 18px; font-weight: 700; color: var(--blue2); font-family: var(--title); }

  .hist-stats {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    padding: 10px 16px;
  }

  .hstat { font-size: 11px; color: var(--text2); font-family: var(--body); }
  .hstat b { color: var(--text); font-weight: 600; }

  .empty {
    text-align: center;
    padding: 48px 20px;
    color: var(--text3);
    font-size: 13px;
    line-height: 1.6;
    font-family: var(--body);
  }
  .empty span { display: block; font-size: 32px; margin-bottom: 12px; }

  .section-label {
    font-size: 10px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: .15em;
    font-family: var(--title);
    margin-bottom: 10px;
  }

  .chart-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 16px;
    margin-bottom: 16px;
  }

  .chart-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; font-family: var(--font); color: var(--blue2); }
  .chart-sub { font-size: 10px; color: var(--text3); font-family: var(--title); margin-bottom: 14px; letter-spacing: 1px; }

  .chart-legend { display: flex; gap: 16px; margin-bottom: 12px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--text2); font-family: var(--title); letter-spacing: 0.5px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .chart-wrap { position: relative; height: 200px; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: linear-gradient(135deg, #0d1a2e, #081220);
    border: 1px solid var(--blue);
    border-radius: 10px;
    padding: 12px 20px;
    font-family: var(--title);
    font-size: 13px;
    color: var(--blue2);
    letter-spacing: 1px;
    box-shadow: 0 0 30px var(--blue-glow);
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 500;
    white-space: nowrap;
    text-align: center;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Animated particles on level up */
  .particle {
    position: fixed;
    pointer-events: none;
    z-index: 998;
    font-size: 20px;
    animation: particle-fly 1.5s ease-out forwards;
  }

  @keyframes particle-fly {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-200px) scale(0); opacity: 0; }
  }
</style>
</head>

// ─── LEVEL SYSTEM ───────────────────────────────────────
const LEVELS = [
  { level: 1, xpRequired: 0,    title: 'Rango E · Principiante',  color: '#6a7a9a' },
  { level: 2, xpRequired: 200,  title: 'Rango E · Iniciado',      color: '#6a7a9a' },
  { level: 3, xpRequired: 450,  title: 'Rango D · Aprendiz',      color: '#00b4ff' },
  { level: 4, xpRequired: 750,  title: 'Rango D · Guerrero',      color: '#00b4ff' },
  { level: 5, xpRequired: 1100, title: 'Rango C · Cazador',       color: '#00fff0' },
  { level: 6, xpRequired: 1500, title: 'Rango C · Élite',         color: '#00fff0' },
  { level: 7, xpRequired: 2000, title: 'Rango B · Maestro',       color: '#a78bfa' },
  { level: 8, xpRequired: 2600, title: 'Rango B · Campeón',       color: '#a78bfa' },
  { level: 9, xpRequired: 3300, title: 'Rango A · Leyenda',       color: '#ffc533' },
  { level: 10,xpRequired: 4100, title: 'Rango S · El Elegido',    color: '#ff3c6e' },
];

function getLevelData(totalXp) {
  let current = LEVELS[0];
  let next = LEVELS[1];
  for (let i = 0; i < LEVELS.length; i++) {
    if (totalXp >= LEVELS[i].xpRequired) {
      current = LEVELS[i];
      next = LEVELS[i + 1] || null;
    }
  }
  const xpInLevel = totalXp - current.xpRequired;
  const xpToNext = next ? next.xpRequired - current.xpRequired : 1;
  const pct = next ? Math.min(100, Math.round((xpInLevel / xpToNext) * 100)) : 100;
  return { current, next, xpInLevel, xpToNext, pct };
}

// ─── STATE ──────────────────────────────────────────────
function getState() {
  try { return JSON.parse(localStorage.getItem('gymState') || '{}'); } catch { return {}; }
}

function saveState(s) {
  localStorage.setItem('gymState', JSON.stringify(s));
}

function getMetrics() {
  try { return JSON.parse(localStorage.getItem('gymMetrics') || '[]'); } catch { return []; }
}

let currentDay = 0;
let checked = {}; // { dayIndex: Set of exercise indices }

function getChecked(day) {
  const s = getState();
  return new Set(s.checked && s.checked[day] ? s.checked[day] : []);
}

function saveChecked(day, set) {
  const s = getState();
  if (!s.checked) s.checked = {};
  s.checked[day] = [...set];
  saveState(s);
}

      <!-- Head -->
      <ellipse cx="40" cy="22" rx="10" ry="10" fill="${col}" opacity="0.8"/>

      <rect x="50" y="33" width="15" height="6" rx="3" fill="${col}" opacity="0.6" transform="rotate(15 57 36)"/>
      <!-- Legs -->

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

// ─── UI UPDATES ──────────────────────────────────────────
function updateHUD() {
  const s = getState();
  const totalXp = s.totalXp || 0;
  const streak = s.streak || 0;
  const sessions = s.sessions || 0;
  const ld = getLevelData(totalXp);

  // Header
  document.getElementById('headerLevel').textContent = `LVL ${ld.current.level}`;
  document.getElementById('headerXpBar').style.width = ld.pct + '%';
  document.getElementById('headerXpLabel').textContent =
    ld.next ? `${ld.xpInLevel}/${ld.xpToNext}` : 'MAX';
  document.getElementById('streakPill').textContent = `🔥 ${streak}`;

  // Character panel
  document.getElementById('charName').textContent = `HUNTER · LVL ${ld.current.level}`;
  document.getElementById('charTitle').textContent = ld.current.title;
  document.getElementById('charTitle').style.color = ld.current.color;
  document.getElementById('charXp').textContent = totalXp;
  document.getElementById('charSessions').textContent = sessions;
  document.getElementById('charStreak').textContent = streak + '🔥';

  drawCharacter(ld.current.level, ld.current.color);
}

// ─── WORKOUT RENDER ──────────────────────────────────────
function renderPills() {
  const s = getState();
  const completed = s.completedDays || [];
  document.getElementById('dayPills').innerHTML = DAYS.map((d,i) => {
    const isDone = completed.includes(i);
    return `<div class="day-pill${i===currentDay?' on':''}${isDone?' done':''}" onclick="selectDay(${i})">${d.label}</div>`;
  }).join('');
}

function renderDay() {
  const d = DAYS[currentDay];
  const checkedSet = getChecked(currentDay);
  const total = d.exercises.length;
  const done = checkedSet.size;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  const s = getState();
  const completedDays = s.completedDays || [];
  const alreadyDone = completedDays.includes(currentDay);

  document.getElementById('dayContent').innerHTML = `
    <div class="wk-head">
      <span class="wk-name">${d.name}</span>
      <span class="wk-badge">${d.badge}</span>
    </div>
    <div class="wk-meta">${d.meta}</div>
    <div class="wk-warmup"><b>⚡ Calentamiento</b> ${d.warmup}</div>
    <div class="session-xp">
      <span class="session-xp-label">XP por completar esta sesión</span>
      <span class="session-xp-val">+${d.xp} XP</span>
    </div>
    <div class="session-progress">
      <div class="sp-top">
        <span class="sp-label">Progreso de sesión</span>
        <span class="sp-count">${done}/${total} ejercicios</span>
      </div>
      <div class="sp-bar"><div class="sp-fill" style="width:${pct}%"></div></div>
    </div>
    ${d.exercises.map((e,i) => {
      const isChecked = checkedSet.has(i);
      return `
        <div class="ex-row${isChecked?' completed':''}" id="exrow-${i}">
          <div class="ex-check${isChecked?' checked':''}" id="excheck-${i}" onclick="toggleExercise(${i})"></div>
          <div class="ex-info">
            <div class="ex-name">${e.name}</div>
            <div class="ex-equip">${e.equip}</div>
          </div>
          <div class="ex-right">
            <div class="ex-series">${e.series}</div>
            <div class="ex-rest">${e.rest}</div>
          </div>
        </div>`;
    }).join('')}
    ${d.tip ? `<div class="tip-box">${d.tip}</div>` : ''}
    <button class="complete-btn" id="completeBtn" onclick="completeSession()"
      ${alreadyDone ? 'disabled' : ''}>
      ${alreadyDone ? '✓ SESIÓN COMPLETADA' : '⚡ COMPLETAR SESIÓN · +' + d.xp + ' XP'}
    </button>
  `;
}

function toggleExercise(idx) {
  const checkedSet = getChecked(currentDay);
  if (checkedSet.has(idx)) {
    checkedSet.delete(idx);
  } else {
    checkedSet.add(idx);
  }
  saveChecked(currentDay, checkedSet);
  renderDay(); // re-render to update progress bar
}

function completeSession() {
  const s = getState();
  const d = DAYS[currentDay];
  const completedDays = s.completedDays || [];

  if (completedDays.includes(currentDay)) return;

  const prevXp = s.totalXp || 0;
  const prevLevel = getLevelData(prevXp).current.level;

  // Bonus XP if all exercises checked
  const checkedSet = getChecked(currentDay);
  const bonus = checkedSet.size === d.exercises.length ? 30 : 0;
  const xpGained = d.xp + bonus;

  s.totalXp = prevXp + xpGained;
  s.sessions = (s.sessions || 0) + 1;
  completedDays.push(currentDay);
  s.completedDays = completedDays;

  // Streak: check last session date
  const today = new Date().toDateString();
  if (s.lastSessionDate === today) {
    // same day, no streak increment
  } else {
    const yesterday = new Date(Date.now() - 86400000).toDateString();
    if (s.lastSessionDate === yesterday) {
      s.streak = (s.streak || 0) + 1;
    } else {
      s.streak = 1;
    }
    s.lastSessionDate = today;
  }

  saveState(s);

  const newLevel = getLevelData(s.totalXp).current.level;
  const leveledUp = newLevel > prevLevel;

  updateHUD();
  renderPills();
  renderDay();

  if (leveledUp) {
    triggerLevelUp(newLevel, getLevelData(s.totalXp).current.title);
  } else {
    const msg = bonus > 0
      ? `+${xpGained} XP 🎯 BONUS por completar todo!`
      : `+${xpGained} XP ganados!`;
    showToast(msg);
  }
}

// ─── LEVEL UP EFFECTS ────────────────────────────────────
function triggerLevelUp(level, title) {
  const flash = document.getElementById('levelupFlash');
  flash.classList.add('show');
  setTimeout(() => flash.classList.remove('show'), 1500);

  // Particles
  const emojis = ['⚡','✨','🔵','💫','🌟'];
  for (let i = 0; i < 8; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'particle';
      p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      p.style.left = (20 + Math.random() * 60) + '%';
      p.style.top = (40 + Math.random() * 20) + '%';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 1500);
    }, i * 80);
  }

  showToast(`⚡ LEVEL UP · LVL ${level} · ${title}`);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function selectDay(i) {
  currentDay = i;
  renderPills();
  renderDay();
}

function showTab(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('on'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  btn.classList.add('on');
  if (id === 'metrics') renderLatest();
  if (id === 'history') renderHistory();
}

// ─── METRICS ─────────────────────────────────────────────
function saveMetric() {
  const f = {
    fecha: document.getElementById('mDate').value,
    peso: document.getElementById('mPeso').value,
    grasa: document.getElementById('mGrasa').value,
    musculo: document.getElementById('mMusculo').value,
    visceral: document.getElementById('mVisceral').value,
    tmb: document.getElementById('mTmb').value,
    agua: document.getElementById('mAgua').value,
    esq: document.getElementById('mEsq').value,
    prot: document.getElementById('mProt').value,
    osea: document.getElementById('mOsea').value
  };
  if (!f.fecha || !f.peso) { alert('Fecha y peso son obligatorios'); return; }
  const list = getMetrics();
  list.unshift(f);
  localStorage.setItem('gymMetrics', JSON.stringify(list));
  ['mPeso','mGrasa','mMusculo','mVisceral','mTmb','mAgua','mEsq','mProt','mOsea'].forEach(id => {
    document.getElementById(id).value = '';
  });
  showToast('✓ Medición guardada');
  renderLatest();
}

function renderLatest() {
  const list = getMetrics();
  const c = document.getElementById('latestSummary');
  if (!list.length) { c.innerHTML = ''; return; }
  const l = list[0];
  const warn = parseFloat(l.visceral || 0) >= 10
    ? `<div class="alert-box"><b>⚠ Grasa visceral ${l.visceral}</b> — zona de atención. Priorizar piernas + caminadora inclinada.</div>`
    : '';
  c.innerHTML = `${warn}
    <div class="section-label" style="margin-bottom:10px">ÚLTIMA MEDICIÓN · ${l.fecha}</div>
    <div class="summary-grid">
      <div class="sum-card"><div class="sum-label">Peso</div><div class="sum-val">${l.peso} <span class="sum-unit">kg</span></div></div>
      <div class="sum-card"><div class="sum-label">Grasa</div><div class="sum-val">${l.grasa} <span class="sum-unit">%</span></div></div>
      <div class="sum-card"><div class="sum-label">Músculo</div><div class="sum-val">${l.musculo} <span class="sum-unit">%</span></div></div>
      <div class="sum-card"><div class="sum-label">Visceral</div><div class="sum-val">${l.visceral} <span class="sum-unit">idx</span></div></div>
    </div>`;
}

// ─── HISTORY ─────────────────────────────────────────────
let chartInstance = null;

function renderHistory() {
  const list = getMetrics();
  const c = document.getElementById('historyList');

  const sorted = [...list].sort((a,b) => a.fecha.localeCompare(b.fecha));
  const labels = sorted.map(l => { const [y,m,d] = l.fecha.split('-'); return `${d}/${m}`; });
  const pesoData = sorted.map(l => parseFloat(l.peso) || null);
  const grasaData = sorted.map(l => parseFloat(l.grasa) || null);

  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }

  if (sorted.length >= 1) {
    const ctx = document.getElementById('progressChart').getContext('2d');
    chartInstance = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            label: 'Peso (kg)',
            data: pesoData,
            borderColor: '#00b4ff',
            backgroundColor: 'rgba(0,180,255,0.06)',
            borderWidth: 2,
            pointBackgroundColor: '#00b4ff',
            pointRadius: 4,
            tension: 0.3,
            fill: true,
            yAxisID: 'yPeso'
          },
          {
            label: 'Grasa (%)',
            data: grasaData,
            borderColor: '#00ff88',
            backgroundColor: 'rgba(0,255,136,0.04)',
            borderWidth: 2,
            pointBackgroundColor: '#00ff88',
            pointRadius: 4,
            tension: 0.3,
            fill: true,
            yAxisID: 'yGrasa'
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#0d0d22',
            borderColor: 'rgba(0,180,255,0.2)',
            borderWidth: 1,
            titleColor: '#6a7a9a',
            bodyColor: '#e8f0ff',
            padding: 10,
            callbacks: {
              label: ctx => ctx.dataset.label + ': ' + (ctx.parsed.y !== null ? ctx.parsed.y.toFixed(1) : '—')
            }
          }
        },
        scales: {
          x: {
            grid: { color: 'rgba(0,180,255,0.04)' },
            ticks: { color: '#3a4a6a', font: { family: "'Orbitron'", size: 9 } }
          },
          yPeso: {
            position: 'left',
            grid: { color: 'rgba(0,180,255,0.04)' },
            ticks: { color: '#00b4ff', font: { family: "'Orbitron'", size: 9 }, callback: v => v + 'kg' }
          },
          yGrasa: {
            position: 'right',
            grid: { drawOnChartArea: false },
            ticks: { color: '#00ff88', font: { family: "'Orbitron'", size: 9 }, callback: v => v + '%' }
          }
        }
      }
    });
  }

  if (!list.length) {
    c.innerHTML = '<div class="empty"><span>📊</span>Sin registros aún.<br>Agrega tu primera medición en Stats.</div>';
    return;
  }

  c.innerHTML = list.map(l => `
    <div class="hist-card">
      <div class="hist-head">
        <span class="hist-date">${l.fecha}</span>
        <span class="hist-weight">${l.peso} kg</span>
      </div>
      <div class="hist-stats">
        ${l.grasa ? `<span class="hstat">Grasa <b>${l.grasa}%</b></span>` : ''}
        ${l.musculo ? `<span class="hstat">Músculo <b>${l.musculo}%</b></span>` : ''}
        ${l.visceral ? `<span class="hstat">Visceral <b>${l.visceral}</b></span>` : ''}
        ${l.tmb ? `<span class="hstat">TMB <b>${l.tmb}kcal</b></span>` : ''}
        ${l.agua ? `<span class="hstat">Agua <b>${l.agua}%</b></span>` : ''}
        ${l.prot ? `<span class="hstat">Proteína <b>${l.prot}%</b></span>` : ''}
      </div>
    </div>`).join('');
}

// ─── INIT ────────────────────────────────────────────────
document.getElementById('mDate').value = new Date().toISOString().split('T')[0];
updateHUD();
renderPills();
renderDay();
renderLatest();
</script>
</body>
</html>
